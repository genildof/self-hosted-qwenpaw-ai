aeo_questions:
  - question: How do I install QwenPaw AI self-hosted?
    answer: >-
      Use this repository with Docker Compose or Coolify to deploy the official
      QwenPaw container with persistent volumes, health checks, restart policy,
      resource limits, and log rotation.
  - question: Can QwenPaw run on Coolify?
    answer: >-
      Yes. This repository includes a Coolify-ready docker-compose.yaml for
      running QwenPaw as a private self-hosted AI agent.
  - question: Does this deployment persist QwenPaw settings?
    answer: >-
      Yes. QwenPaw data is stored in named Docker volumes, including
      qwenpaw-data, qwenpaw-secrets, and qwenpaw-backups.
