version: "3.8"

volumes:
  qwenpaw-data:
    name: qwenpaw-data
  qwenpaw-secrets:
    name: qwenpaw-secrets
  qwenpaw-backups:
    name: qwenpaw-backups

services:
  qwenpaw:
    image: agentscope/qwenpaw:latest
    init: true
    container_name: qwenpaw
    restart: always
    cpus: "${QWENPAW_CPUS:-1.50}"
    mem_limit: "${QWENPAW_MEMORY_LIMIT:-2g}"
    memswap_limit: "${QWENPAW_MEMORY_SWAP_LIMIT:-2g}"
    pids_limit: ${QWENPAW_PIDS_LIMIT:-256}
    oom_kill_disable: false
    stop_grace_period: 30s
    ports:
      - "8088:8088"
    environment:
      - QWENPAW_AUTH_ENABLED=${QWENPAW_AUTH_ENABLED:-false}
      - QWENPAW_AUTH_USERNAME=${QWENPAW_AUTH_USERNAME:-admin}
      - QWENPAW_AUTH_PASSWORD=${QWENPAW_AUTH_PASSWORD:-}
    volumes:
      - qwenpaw-data:/app/working
      - qwenpaw-secrets:/app/working.secret
      - qwenpaw-backups:/app/working.backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "${QWENPAW_LOG_MAX_SIZE:-10m}"
        max-file: "${QWENPAW_LOG_MAX_FILE:-3}"
