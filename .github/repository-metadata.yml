name: self-hosted-qwenpaw-ai
description: >-
  Self-hosted QwenPaw AI deployment for Docker Compose and Coolify with
  persistent storage, health checks, restart policy, resource limits, and
  production-oriented defaults for Linux servers.
homepage: https://github.com/genildof/self-hosted-qwenpaw-ai
repository: https://github.com/genildof/self-hosted-qwenpaw-ai
