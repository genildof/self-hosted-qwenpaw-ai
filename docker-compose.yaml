volumes:
  qwenpaw-data:
    name: qwenpaw-data
  qwenpaw-secrets:
    name: qwenpaw-secrets
  qwenpaw-backups:
    name: qwenpaw-backups

services:
  qwenpaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: self-hosted-qwenpaw-ai:latest
    init: true
    container_name: qwenpaw
    restart: unless-stopped
    cpus: "${QWENPAW_CPUS:-1.00}"
    mem_limit: "${QWENPAW_MEMORY_LIMIT:-2g}"
    memswap_limit: "${QWENPAW_MEMORY_SWAP_LIMIT:-2g}"
    mem_reservation: "${QWENPAW_MEMORY_RESERVATION:-1536m}"
    mem_swappiness: ${QWENPAW_MEMORY_SWAPPINESS:-0}
    pids_limit: ${QWENPAW_PIDS_LIMIT:-256}
    oom_kill_disable: false
    stop_grace_period: 30s
    cap_drop:
      - NET_RAW
    ulimits:
      nproc: ${QWENPAW_NPROC_LIMIT:-256}
      nofile:
        soft: ${QWENPAW_NOFILE_SOFT_LIMIT:-2048}
        hard: ${QWENPAW_NOFILE_HARD_LIMIT:-4096}
    tmpfs:
      - /tmp:size=${QWENPAW_TMPFS_SIZE:-256m},mode=1777
    ports:
      - "8088:8088"
    environment:
      - QWENPAW_AUTH_ENABLED=${QWENPAW_AUTH_ENABLED:-false}
      - QWENPAW_AUTH_USERNAME=${QWENPAW_AUTH_USERNAME:-admin}
      - QWENPAW_AUTH_PASSWORD=${QWENPAW_AUTH_PASSWORD:-}
      - TMPDIR=${QWENPAW_TMPDIR:-/app/working}
      - XDG_CACHE_HOME=${QWENPAW_CACHE_HOME:-/app/working/.cache}
      - HF_HOME=${QWENPAW_HF_HOME:-/app/working/.cache/huggingface}
      - transcription_provider_type=${QWENPAW_TRANSCRIPTION_PROVIDER_TYPE:-local_whisper}
      - OMP_NUM_THREADS=${QWENPAW_OMP_NUM_THREADS:-1}
      - OPENBLAS_NUM_THREADS=${QWENPAW_OPENBLAS_NUM_THREADS:-1}
      - MKL_NUM_THREADS=${QWENPAW_MKL_NUM_THREADS:-1}
      - NUMEXPR_NUM_THREADS=${QWENPAW_NUMEXPR_NUM_THREADS:-1}
      - TOKENIZERS_PARALLELISM=${QWENPAW_TOKENIZERS_PARALLELISM:-false}
    volumes:
      - qwenpaw-data:/app/working
      - qwenpaw-secrets:/app/working.secret
      - qwenpaw-backups:/app/working.backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "${QWENPAW_LOG_MAX_SIZE:-5m}"
        max-file: "${QWENPAW_LOG_MAX_FILE:-2}"
